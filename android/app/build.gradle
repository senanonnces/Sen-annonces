plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.senannonces.app"
    compileSdk 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    signingConfigs {
        release {
            storeFile file('keystore.jks')
            storePassword 'senannonces123'
            keyAlias 'senannonces'
            keyPassword 'senannonces123'
        }
    }

    defaultConfig {
        applicationId "com.senannonces.app"
        minSdk 21
        targetSdk 35
        versionCode 10
        versionName "1.2.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source "../.."
}
