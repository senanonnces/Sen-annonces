name: Build APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Install Android SDK 35
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0"
          ls $ANDROID_SDK_ROOT/platforms/

      - name: Create Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias senannonces \
            -storepass senannonces123 -keypass senannonces123 \
            -dname "CN=Sen Annonces,OU=Mobile,O=SenAnnonces,L=Dakar,S=Dakar,C=SN"

      - name: Configure signing
        run: |
          python3 - << 'PYEOF'
          with open("android/app/build.gradle", "r") as f:
              content = f.read()
          signing = """
              signingConfigs {
                  release {
                      storeFile file('keystore.jks')
                      storePassword 'senannonces123'
                      keyAlias 'senannonces'
                      keyPassword 'senannonces123'
                  }
              }
          """
          content = content.replace("    buildTypes {", signing + "    buildTypes {")
          content = content.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release"
          )
          with open("android/app/build.gradle", "w") as f:
              f.write(content)
          print("Done!")
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
