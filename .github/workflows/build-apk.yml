name: Build APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Create Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias senannonces \
            -storepass senannonces123 -keypass senannonces123 \
            -dname "CN=Sen Annonces,OU=Mobile,O=SenAnnonces,L=Dakar,S=Dakar,C=SN"

      - name: Configure signing in build.gradle
        run: |
          python3 - << 'PYEOF'
          with open("android/app/build.gradle", "r") as f:
              content = f.read()
          
          signing = """
              signingConfigs {
                  release {
                      storeFile file('keystore.jks')
                      storePassword 'senannonces123'
                      keyAlias 'senannonces'
                      keyPassword 'senannonces123'
                  }
              }
          """
          
          # Add signing config before buildTypes
          content = content.replace(
              "    buildTypes {",
              signing + "    buildTypes {"
          )
          
          # Update release buildType to use signing
          content = content.replace(
              """        release {
                signingConfig signingConfigs.debug""",
              """        release {
                signingConfig signingConfigs.release"""
          )
          
          with open("android/app/build.gradle", "w") as f:
              f.write(content)
          print("build.gradle updated!")
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
