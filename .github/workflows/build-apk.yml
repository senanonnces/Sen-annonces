name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Generate Android folder
        run: |
          flutter create --org com.senannonces --project-name sen_annonces --platforms android /tmp/flutter_base
          rm -rf android
          cp -r /tmp/flutter_base/android .
          python3 -c "
content = open('android/app/src/main/AndroidManifest.xml').read()
perm = '<uses-permission android:name="android.permission.INTERNET"/>'
perm2 = '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>'
if 'INTERNET' not in content:
    content = content.replace('<application', perm + chr(10) + '    ' + perm2 + chr(10) + '    <application')
open('android/app/src/main/AndroidManifest.xml', 'w').write(content)
print('Manifest updated')
print(open('android/app/src/main/AndroidManifest.xml').read()[:300])
"
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.23"/' android/build.gradle || true
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
