name: Build APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Setup local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Update compileSdk and targetSdk to 35
        run: |
          sed -i 's/compileSdk [0-9]*/compileSdk 35/' android/app/build.gradle
          sed -i 's/targetSdk [0-9]*/targetSdk 35/' android/app/build.gradle
          # Download android-35 platform manually
          wget -q "https://dl.google.com/android/repository/platform-35_r02.zip" -O /tmp/android-35.zip || true
          if [ -f /tmp/android-35.zip ]; then
            mkdir -p $ANDROID_SDK_ROOT/platforms/android-35
            unzip -q /tmp/android-35.zip -d /tmp/android-35-extracted
            cp -r /tmp/android-35-extracted/android-35/* $ANDROID_SDK_ROOT/platforms/android-35/
            echo "Platform 35 installed manually"
          else
            # Fallback: use compileSdk 34
            sed -i 's/compileSdk 35/compileSdk 34/' android/app/build.gradle
            echo "Using compileSdk 34 as fallback"
          fi
          grep "compileSdk\|targetSdk" android/app/build.gradle

      - name: Create Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias senannonces \
            -storepass senannonces123 -keypass senannonces123 \
            -dname "CN=Sen Annonces,OU=Mobile,O=SenAnnonces,L=Dakar,S=Dakar,C=SN"

      - name: Configure signing
        run: |
          python3 - << 'PYEOF'
          with open("android/app/build.gradle", "r") as f:
              content = f.read()
          if "signingConfigs" not in content:
              signing = """
              signingConfigs {
                  release {
                      storeFile file('keystore.jks')
                      storePassword 'senannonces123'
                      keyAlias 'senannonces'
                      keyPassword 'senannonces123'
                  }
              }
          """
              content = content.replace("    buildTypes {", signing + "    buildTypes {")
          content = content.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
          with open("android/app/build.gradle", "w") as f:
              f.write(content)
          print("Done!")
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sen-annonces-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
